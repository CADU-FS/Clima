<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clima</title>

  <link rel="stylesheet" href="style/mobile.css">
  <link rel="stylesheet" href="style/media.css" media="screen and (min-width: 700px)">
  <script src="https://kit.fontawesome.com/72c8ee24a1.js" crossorigin="anonymous"></script>
</head>
<body>
  <section>
    <span id="video"></span>
    <video autoplay muted loop id="bg-video">
        <source src="media/video-from-rawpixel-id-17023856-sd.mp4" type="video/mp4">
        Seu navegador não suporta vídeos.
    </video>
  </section>

  <section id="search-location">
    <input type="search" name="location-input" id="location-input" placeholder="Pesquisar local">
    <button onclick="getInput()">
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>
  </section>

  <main>
    <section id="today-info">
      <div id="location-group">
        <span id="location-icon-span">
          <i class="fa-solid fa-location-dot"></i>
        </span>
        <h1 id="location">Bacabal</h1>
      </div>
      <div id="weather-area">
        <div id="temperature-area">
          <h2 id="temperature">-11</h2>
          <div id="apparent-temperature-area">
            <p>Temp. aparente:</p>
            <h2 id="apparent-temperature">-15</h2>
          </div>
        </div>

        <div class="others-info">
          <div class="others-info-item">
            <i class="fa-solid fa-wind"></i>
            <p class="wind-speed">10</p>
          </div>
          <div class="others-info-item">
            <i class="fa-solid fa-droplet"></i>
            <p class="relative-humidity">65</p>
          </div>
          <div class="others-info-item">
            <i class="fa-solid fa-cloud-showers-heavy"></i>
            <p class="precipitation">50</p>
          </div>
          <div class="others-info-item">
            <i class="fa-solid fa-gauge-high"></i>
            <p class="pressure">10</p>
          </div>
        </div>
      </div>
    </section>

    <section id="weather-forecast">
      <div id="weather-forecast-header">
        <i class="fa-solid fa-calendar"></i>
        <h3>Previsão para 6 dias</h3>
      </div>
      
      <div id="weather-forecast-area">
        <div class="weather-forecast-item item-1 visible">
          <p>Hoje</p>
          <div class="item-precipitation">
            <i class="fa-solid fa-cloud-showers-heavy"></i>
            <p class="precipitation-chance">30</p>
          </div>
          <div class="item-temperature">
            <p class="max-temperature">29</p>
            <span></span>
            <p class="min-temperature">23</p>
          </div>
        </div>

        <div class="weather-forecast-item item-2 visible">
          <p>Amanhã</p>
          <div class="item-precipitation">
            <i class="fa-solid fa-cloud-showers-heavy"></i>
            <p class="precipitation-chance">40</p>
          </div>
          <div class="item-temperature">
            <p class="max-temperature">28</p>
            <span></span>
            <p class="min-temperature">21</p>
          </div>
        </div>

        <div class="weather-forecast-item item-3 visible">
          <p>Domingo</p>
          <div class="item-precipitation">
            <i class="fa-solid fa-cloud-showers-heavy"></i>
            <p class="precipitation-chance">90</p>
          </div>
          <div class="item-temperature">
            <p class="max-temperature">26</p>
            <span></span>
            <p class="min-temperature">10</p>
          </div>
        </div>

        <div class="weather-forecast-item item-4 invisible">
          <p>Segunda</p>
          <div class="item-precipitation">
            <i class="fa-solid fa-cloud-showers-heavy"></i>
            <p class="precipitation-chance">80</p>
          </div>
          <div class="item-temperature">
            <p class="max-temperature">25</p>
            <span></span>
            <p class="min-temperature">15</p>
          </div>
        </div>

        <div class="weather-forecast-item item-5 invisible">
          <p>Terça</p>
          <div class="item-precipitation">
            <i class="fa-solid fa-cloud-showers-heavy"></i>
            <p class="precipitation-chance">60</p>
          </div>
          <div class="item-temperature">
            <p class="max-temperature">28</p>
            <span></span>
            <p class="min-temperature">21</p>
          </div>
        </div>

        <div class="weather-forecast-item item-6 invisible">
          <p>Quarta</p>
          <div class="item-precipitation">
            <i class="fa-solid fa-cloud-showers-heavy"></i>
            <p class="precipitation-chance">40</p>
          </div>
          <div class="item-temperature">
            <p class="max-temperature">30</p>
            <span></span>
            <p class="min-temperature">25</p>
          </div>
        </div>
      </div>

      <div class="full-forecast">
        <a href="#">
          <p>Mostrar a previsão completa</p>
          <i class="fa-solid fa-angle-down"></i>
        </a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
