<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clima</title>

  <link rel="stylesheet" href="style/mobile.css">
  <script src="https://kit.fontawesome.com/72c8ee24a1.js" crossorigin="anonymous"></script>
</head>
<body>
  <main>
    <video autoplay muted loop id="bg-video">
        <source src="media/video-from-rawpixel-id-16958055-sd.mp4" type="video/mp4">
        Seu navegador não suporta vídeos.
    </video>

    <section id="search-location">
      <input type="search" name="location-input" id="location-input" placeholder="Pesquisar local">
      <button>
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>
    </section>

    <section id="today-info">
      <div id="location-group">
        <span id="location-icon-span">
          <i class="fa-solid fa-location-dot"></i>
        </span>
        <h1 id="location">Bacabal</h1>
      </div>
      <div id="weather-area">
        <div id="temperature-area">
          <h2 id="temperature">32</h2>
          <div id="apparent-temperature-area">
            <p>Temp. aparente:</p>
            <h2 id="apparent-temperature">35</h2>
          </div>
        </div>

        <div class="others-info">
          <p class="wind-speed">10</p>
          <p class="relative-humidity">65</p>
          <p class="precipitation">50</p>
          <p class="rain">10</p>
        </div>
      </div>
    </section>
    <section id="weather-forecast">

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
